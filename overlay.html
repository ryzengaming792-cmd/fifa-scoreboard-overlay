<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 26 Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="overlay.css">
</head>
<body>
    <div class="scoreboard-container">
        <!-- Match Timer -->
        <div class="match-time-container">
            <div class="match-time" id="match-time">00:00</div>
            <div class="match-half" id="match-status">LIVE</div>
        </div>

        <!-- Main Scoreboard -->
        <div class="scoreboard">
            <!-- Team 1 -->
            <div class="team team-left">
                <div class="team-color" style="background-color: #00a859;"></div>
                <div class="team-info">
                    <img id="flag-t1" src="https://flagcdn.com/w80/us.png" alt="Flag" class="flag">
                    <span id="name-t1" class="team-name">USA</span>
                </div>
            </div>

            <!-- Score Area -->
            <div class="score-area">
                <span id="score-t1" class="score">0</span>
                <span class="score-divider">-</span>
                <span id="score-t2" class="score">0</span>
            </div>

            <!-- Team 2 -->
            <div class="team team-right">
                <div class="team-info">
                    <span id="name-t2" class="team-name">MEX</span>
                    <img id="flag-t2" src="https://flagcdn.com/w80/mx.png" alt="Flag" class="flag">
                </div>
                <div class="team-color" style="background-color: #002654;"></div>
            </div>
        </div>

        <!-- Tournament Branding / Logo -->
        <div class="branding">
            <div class="logo-animation">
                <span class="branding-text">FIFA WORLD CUP 26™</span>
            </div>
        </div>
    </div>

    <!-- Goal Animation Popup -->
    <div id="goal-popup" class="goal-popup hidden">
        <div class="goal-light"></div>
        <div class="goal-text">GOAL!</div>
        <div class="goal-scorer">
            <span id="goal-scorer-team" class="goal-team">USA</span>
        </div>
    </div>

    <script src="overlay.js"></script>
</body>
</html>
